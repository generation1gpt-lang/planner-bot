<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Planner</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cal+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #1c1c1e;
  --bg2:      #2c2c2e;
  --bg3:      #3a3a3c;
  --bg4:      #48484a;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --text:     #f2f2f7;
  --text2:    #aeaeb2;
  --text3:    #636366;
  --accent:   #0a84ff;
  --accent-bg:rgba(10,132,255,0.15);
  --purple:   #bf5af2;
  --purple-bg:rgba(191,90,242,0.15);
  --green:    #30d158;
  --green-bg: rgba(48,209,88,0.15);
  --red:      #ff453a;
  --red-bg:   rgba(255,69,58,0.15);
  --amber:    #ffd60a;
  --amber-bg: rgba(255,214,10,0.15);
  --r:        12px;
  --rl:       16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overscroll-behavior:none}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.content{flex:1;overflow-y:auto;padding-bottom:80px}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 0;position:sticky;top:0;
  background:rgba(28,28,30,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:50;
}
.topbar-title{font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--text)}
.topbar-date{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center}
.icon-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s
}
.icon-btn:active{transform:scale(.92);background:var(--bg3)}

/* ── TABS ── */
.tabs{display:flex;gap:4px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:5px 12px;border-radius:6px;font-size:13px;font-weight:500;
  color:var(--text3);cursor:pointer;white-space:nowrap;border:none;background:none;
  transition:all .15s;font-family:'Inter',sans-serif;flex-shrink:0
}
.tab.active{background:var(--accent);color:#fff}

/* ── SECTION LABEL ── */
.sec{padding:16px 16px 6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}

/* ── TASK CARDS ── */
.tasks{padding:0 12px;display:flex;flex-direction:column;gap:4px}
.task{
  display:flex;align-items:flex-start;gap:10px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 12px;
  cursor:pointer;transition:all .15s;position:relative;
  -webkit-user-select:none;user-select:none
}
.task:active{transform:scale(.98);background:var(--bg2)}
.task.done{opacity:.45}
.task.dragging{opacity:.3;transform:scale(.96)}
.task.drag-over{border-color:var(--accent);background:var(--accent-bg)}

.task-check{
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.task.done .task-check{background:var(--green);border-color:var(--green)}
.task.done .task-check::after{content:'✓';font-size:11px;color:#fff;font-weight:700}

.task-body{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4}
.task.done .task-title{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
.tag{
  font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;
  display:inline-flex;align-items:center;gap:3px
}
.tag-time{background:var(--accent-bg);color:var(--accent)}
.tag-urgent{background:var(--red-bg);color:var(--red)}
.tag-ai{background:var(--purple-bg);color:var(--purple)}
.tag-anytime{background:var(--bg3);color:var(--text3)}
.task-note{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.4}

/* ── PRIORITY DOT ── */
.prio{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.prio.high{background:var(--red)}
.prio.med{background:var(--amber)}
.prio.low{background:var(--green)}

/* ── TIMELINE ── */
.timeline{padding:0 12px}
.tl-hour{display:flex;gap:10px;min-height:52px;position:relative}
.tl-hour:not(:last-child)::after{
  content:'';position:absolute;left:28px;top:24px;bottom:-4px;
  width:1px;background:var(--border);pointer-events:none
}
.tl-label{width:28px;font-size:11px;color:var(--text3);padding-top:4px;flex-shrink:0;text-align:right;font-weight:500}
.tl-slot{flex:1;padding:2px 0;display:flex;flex-direction:column;gap:4px}
.tl-empty{min-height:40px;border-radius:var(--r);border:1px dashed transparent;transition:all .15s}
.tl-empty.drag-over{border-color:var(--accent);background:var(--accent-bg)}

/* ── NOW LINE ── */
.now-line{
  display:flex;align-items:center;gap:6px;padding:4px 12px;
  color:var(--red);font-size:11px;font-weight:600
}
.now-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0}
.now-bar{flex:1;height:1px;background:var(--red);opacity:.4}

/* ── CALENDAR ── */
.cal-wrap{padding:0 12px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
.cal-month{font-size:16px;font-weight:700}
.cal-arrow{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px}
.cal-day{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:500;position:relative;transition:all .12s
}
.cal-day:hover{background:var(--bg2)}
.cal-day.today{background:var(--text);color:#fff;font-weight:700}
.cal-day.selected:not(.today){background:var(--accent-bg);color:var(--accent);font-weight:600}
.cal-day.other{color:var(--text3)}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);position:absolute;bottom:3px}
.cal-day.today .cal-dot{background:#fff}

.cal-day-header{font-size:16px;font-weight:700;padding:16px 12px 8px}
.cal-day-list{padding:0 12px;display:flex;flex-direction:column;gap:4px}
.cal-empty{padding:12px;font-size:13px;color:var(--text3)}

/* ── AI VIEW ── */
.ai-wrap{padding:0 12px}
.ai-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rl);padding:14px;margin-bottom:10px
}
.ai-card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-icon.purple{background:var(--purple-bg)}
.ai-icon.blue{background:var(--accent-bg)}
.ai-icon.green{background:var(--green-bg)}
.ai-card-title{font-size:14px;font-weight:600;color:var(--text)}
.ai-body{font-size:13px;color:var(--text2);line-height:1.6}
.ai-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.ai-chip{
  padding:5px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);
  font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif
}
.ai-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.ai-chip:active{transform:scale(.96)}

.voice-fab{
  width:100%;padding:13px;border-radius:var(--r);
  background:var(--accent);border:none;color:#fff;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px
}
.voice-fab:active{transform:scale(.97);opacity:.88}
.voice-fab.recording{background:var(--red);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}

/* ── CHECKLISTS ── */
.cl-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.cl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cl-name{font-size:14px;font-weight:600}
.cl-count{font-size:12px;color:var(--text3)}
.cl-bar{height:3px;background:var(--bg4);border-radius:3px;margin-bottom:12px;overflow:hidden}
.cl-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:3px;transition:width .4s}
.cl-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer}
.cl-item:last-of-type{border-bottom:none}
.cl-box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cl-item.done .cl-box{background:var(--accent);border-color:var(--accent)}
.cl-item.done .cl-box::after{content:'✓';font-size:10px;color:#fff;font-weight:700}
.cl-item.done .cl-text{text-decoration:line-through;color:var(--text3)}
.cl-text{font-size:13px}
.cl-add{width:100%;padding:7px;border-radius:7px;border:1px dashed var(--border2);background:none;font-size:12px;color:var(--text3);cursor:pointer;margin-top:8px;font-family:'Inter',sans-serif;transition:all .15s}
.cl-add:hover{border-color:var(--accent);color:var(--accent)}

/* ── BOTTOM NAV ── */
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(28,28,30,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;padding:8px 8px 20px;gap:4px;z-index:50
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;border-radius:8px;cursor:pointer;transition:all .15s;border:none;background:none;
}
.bnav-item.active .bnav-label{color:var(--accent)}
.bnav-item.active .bnav-icon{color:var(--accent)}
.bnav-icon{font-size:20px;color:var(--text3)}
.bnav-label{font-size:10px;font-weight:500;color:var(--text3)}
.bnav-add{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px;cursor:pointer;border:none;background:none
}
.bnav-add-circle{
  width:40px;height:40px;border-radius:12px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;
  transition:all .15s
}
.bnav-add-circle:active{transform:scale(.92)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{
  background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:480px;
  padding:20px 16px 40px;animation:up .22s ease
}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:14px}
.field-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:5px}
.field-input{
  width:100%;padding:10px 12px;border-radius:var(--r);
  border:1px solid var(--border2);background:var(--bg2);
  color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;
  transition:border-color .15s
}
.field-input:focus{border-color:var(--accent);background:var(--bg)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg-btns{display:flex;background:var(--bg2);border-radius:8px;padding:3px;gap:2px}
.seg-btn{flex:1;padding:6px;border-radius:6px;border:none;background:none;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.seg-btn.active{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.prio-btns{display:flex;gap:6px}
.prio-btn{flex:1;padding:7px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;color:var(--text2)}
.prio-btn.active.high{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.prio-btn.active.med{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.prio-btn.active.low{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.save-btn{width:100%;padding:13px;margin-top:8px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.save-btn:active{transform:scale(.97);opacity:.88}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--bg3);color:var(--text);border:1px solid var(--border2);padding:9px 16px;border-radius:10px;
  font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:200;white-space:nowrap
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.task-edit-btn{
  width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  color:var(--text3);flex-shrink:0;transition:all .15s;cursor:pointer
}
.task-edit-btn:active{background:var(--bg3);color:var(--accent)}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px}
.empty-sub{font-size:12px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Сегодня</div>
      <div class="topbar-date" id="topbar-date"></div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn" onclick="openModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchTab('today',this)">Сегодня</button>
    <button class="tab" onclick="switchTab('timeline',this)">Таймлайн</button>
    <button class="tab" onclick="switchTab('calendar',this)">Календарь</button>
    <button class="tab" onclick="switchTab('checklist',this)">Чеклисты</button>
    <button class="tab" onclick="switchTab('ai',this)">AI</button>
  </div>

  <div class="content" id="content"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottomnav">
  <button class="bnav-item active" id="bn-today" onclick="switchTab('today', null, 'today')">
    <div class="bnav-icon">☀️</div>
    <div class="bnav-label">Сегодня</div>
  </button>
  <button class="bnav-item" id="bn-calendar" onclick="switchTab('calendar', null, 'calendar')">
    <div class="bnav-icon">📅</div>
    <div class="bnav-label">Календарь</div>
  </button>
  <button class="bnav-add" onclick="openModal()">
    <div class="bnav-add-circle">+</div>
    <div class="bnav-label" style="font-size:10px;color:var(--text3)">Задача</div>
  </button>
  <button class="bnav-item" id="bn-checklist" onclick="switchTab('checklist', null, 'checklist')">
    <div class="bnav-icon">✅</div>
    <div class="bnav-label">Чеклист</div>
  </button>
  <button class="bnav-item" id="bn-ai" onclick="switchTab('ai', null, 'ai')">
    <div class="bnav-icon">✨</div>
    <div class="bnav-label">AI</div>
  </button>
</div>

<!-- ADD TASK MODAL -->
<div class="overlay" id="modal" onclick="closeOutside(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Новая задача</div>
    <div class="field">
      <div class="field-label">Название</div>
      <input class="field-input" id="f-title" placeholder="Что нужно сделать?" />
    </div>
    <div class="field">
      <div class="field-label">Тип</div>
      <div class="seg-btns">
        <button class="seg-btn active" onclick="setTaskType('timed',this)">По времени</button>
        <button class="seg-btn" onclick="setTaskType('anytime',this)">Без времени</button>
      </div>
    </div>
    <div id="f-time-wrap" class="field field-row">
      <div>
        <div class="field-label">Дата</div>
        <input class="field-input" type="date" id="f-date" />
      </div>
      <div>
        <div class="field-label">Время</div>
        <input class="field-input" type="time" id="f-time" />
      </div>
    </div>
    <div class="field">
      <div class="field-label">Приоритет</div>
      <div class="prio-btns">
        <button class="prio-btn active high" onclick="setPrio('high',this)">🔴 Высокий</button>
        <button class="prio-btn med" onclick="setPrio('med',this)">🟡 Средний</button>
        <button class="prio-btn low" onclick="setPrio('low',this)">🟢 Низкий</button>
      </div>
    </div>
    <div class="field">
      <div class="field-label">Заметка</div>
      <input class="field-input" id="f-note" placeholder="Детали..." />
    </div>
    <button class="save-btn" onclick="saveTask()">Добавить</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- EDIT TASK MODAL -->
<div class="overlay" id="edit-modal" onclick="if(event.target.id==='edit-modal') document.getElementById('edit-modal').classList.remove('open')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="sheet-title" style="margin:0">Редактировать</div>
      <button onclick="deleteTask()" style="padding:6px 12px;border-radius:8px;border:1px solid var(--red-bg);background:var(--red-bg);color:var(--red);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">🗑 Удалить</button>
    </div>
    <div class="field">
      <div class="field-label">Название</div>
      <input class="field-input" id="e-title" placeholder="Название задачи" />
    </div>
    <div class="field">
      <div class="field-label">Тип</div>
      <div class="seg-btns">
        <button class="seg-btn eseg-btn active" data-type="timed" onclick="setEditType('timed',this)">По времени</button>
        <button class="seg-btn eseg-btn" data-type="anytime" onclick="setEditType('anytime',this)">Без времени</button>
      </div>
    </div>
    <div id="e-time-wrap" class="field field-row">
      <div>
        <div class="field-label">Дата</div>
        <input class="field-input" type="date" id="e-date" />
      </div>
      <div>
        <div class="field-label">Время</div>
        <input class="field-input" type="time" id="e-time" />
      </div>
    </div>
    <div class="field">
      <div class="field-label">Приоритет</div>
      <div class="prio-btns">
        <button class="prio-btn eprio-btn active high" data-prio="high" onclick="setEditPrio('high',this)">🔴 Высокий</button>
        <button class="prio-btn eprio-btn med" data-prio="med" onclick="setEditPrio('med',this)">🟡 Средний</button>
        <button class="prio-btn eprio-btn low" data-prio="low" onclick="setEditPrio('low',this)">🟢 Низкий</button>
      </div>
    </div>
    <div class="field">
      <div class="field-label">Заметка</div>
      <input class="field-input" id="e-note" placeholder="Краткая заметка..." />
    </div>
    <div class="field">
      <div class="field-label">Подробности</div>
      <textarea class="field-input" id="e-details" placeholder="Дополнительная информация, детали встречи и т.д." style="height:80px;resize:none;line-height:1.5"></textarea>
    </div>
    <button class="save-btn" onclick="updateTask()">Сохранить</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.setHeaderColor?.('#1c1c1e'); }

// ── STATE ──
let S = {
  tasks: JSON.parse(localStorage.getItem('ptasks') || '[]'),
  lists: JSON.parse(localStorage.getItem('plists') || JSON.stringify([
    {id:1, name:'Утренняя рутина', items:[
      {id:11,text:'Зарядка 15 минут',done:false},
      {id:12,text:'Холодный душ',done:false},
      {id:13,text:'Чтение 20 минут',done:false},
    ]},
    {id:2, name:'Рабочие задачи', items:[
      {id:21,text:'Проверить почту',done:false},
      {id:22,text:'Daily встреча',done:false},
    ]},
  ])),
  tab: 'today',
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  calSelected: todayStr(),
  newType: 'timed',
  newPrio: 'high',
  dragId: null,
  aiInsight: localStorage.getItem('aiInsight')||'',
};

function save(){
  localStorage.setItem('ptasks', JSON.stringify(S.tasks));
  localStorage.setItem('plists', JSON.stringify(S.lists));
}

function todayStr(){
  const n=new Date();
  return `${n.getFullYear()}-${p2(n.getMonth()+1)}-${p2(n.getDate())}`;
}
function p2(n){return String(n).padStart(2,'0')}
function nowH(){return new Date().getHours()}
function nowTimeStr(){
  const n=new Date();
  return `${p2(n.getHours())}:${p2(n.getMinutes())}`;
}

// ── HEADER ──
function initHeader(){
  const n=new Date();
  const days=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  document.getElementById('topbar-date').textContent=`${days[n.getDay()]}, ${n.getDate()} ${months[n.getMonth()]}`;
}

// ── TABS ──
function switchTab(tab, el, bnav){
  S.tab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  else {
    document.querySelectorAll('.tab').forEach(t=>{
      if(t.textContent.toLowerCase().includes({today:'сегодня',calendar:'кален',checklist:'чекл',ai:'ai',timeline:'тайм'}[tab]||tab)) t.classList.add('active');
    });
  }
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  if(bnav) document.getElementById('bn-'+bnav)?.classList.add('active');

  const titles={today:'Сегодня',timeline:'Таймлайн',calendar:'Календарь',checklist:'Чеклисты',ai:'AI Ассистент'};
  document.getElementById('topbar-title').textContent=titles[tab]||tab;

  const c=document.getElementById('content');
  c.innerHTML='';
  ({today:renderToday,timeline:renderTimeline,calendar:renderCalendar,checklist:renderChecklists,ai:renderAI})[tab]?.();
}

// ── RENDER TODAY ──
function renderToday(){
  const today=todayStr();
  const timed=S.tasks.filter(t=>t.date===today&&t.type==='timed'&&!t.done).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const anytime=S.tasks.filter(t=>t.type==='anytime'&&!t.done);
  const done=S.tasks.filter(t=>t.done&&(t.date===today||(t.type==='anytime')));
  const c=document.getElementById('content');

  let html='';
  if(!timed.length&&!anytime.length&&!done.length){
    html+=`<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">День свободен</div><div class="empty-sub">Нажми + чтобы добавить задачу</div></div>`;
  }
  if(timed.length){
    html+=`<div class="sec">По времени</div><div class="tasks">`;
    timed.forEach(t=>{ html+=taskHTML(t); });
    html+=`</div>`;
  }
  if(anytime.length){
    html+=`<div class="sec">Без времени</div><div class="tasks">`;
    anytime.forEach(t=>{ html+=taskHTML(t); });
    html+=`</div>`;
  }
  if(done.length){
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 16px 6px">
      <div class="sec" style="padding:0;margin:0">Выполнено (${done.length})</div>
      <button onclick="clearDone()" style="font-size:12px;font-weight:600;color:var(--red);background:var(--red-bg);border:1px solid var(--red-bg);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:'Inter',sans-serif">🗑 Очистить всё</button>
    </div>
    <div class="tasks" id="done-list">`;
    done.forEach(t=>{ html+=taskHTML(t); });
    html+=`</div>`;
  }
  c.innerHTML=html;
  bindTaskEvents();
}

async function clearDone(){
  if(!confirm('Удалить все выполненные задачи?')) return;
  const toDelete=S.tasks.filter(t=>t.done);
  S.tasks=S.tasks.filter(t=>!t.done);
  save();
  // delete from server
  if(USER_ID){
    for(const t of toDelete){
      if(!String(t.id).startsWith('demo')){
        await fetch(`/api/tasks/${t.id}`,{method:'DELETE'}).catch(()=>{});
      }
    }
  }
  showToast('🗑 Выполненные удалены');
  renderToday();
}

function taskHTML(t){
  const prioClass={high:'high',med:'med',low:'low'}[t.prio]||'low';
  let tags='';
  if(t.time) tags+=`<span class="tag tag-time">⏰ ${t.time}</span>`;
  if(t.prio==='high') tags+=`<span class="tag tag-urgent">🔴 Срочно</span>`;
  if(t.aiGenerated) tags+=`<span class="tag tag-ai">✨ AI</span>`;
  if(t.type==='anytime') tags+=`<span class="tag tag-anytime">○ Без времени</span>`;
  const hasDetails=t.details&&t.details.trim();
  return `<div class="task ${t.done?'done':''}" data-id="${t.id}" draggable="true">
    <div class="prio ${prioClass}"></div>
    <div class="task-check" onclick="toggleTask('${t.id}')"></div>
    <div class="task-body" onclick="openTaskDetail('${t.id}')">
      <div class="task-title">${t.title}</div>
      ${tags?`<div class="task-meta">${tags}</div>`:''}
      ${t.note?`<div class="task-note">${t.note}</div>`:''}
      ${hasDetails?`<div style="font-size:11px;color:var(--accent);margin-top:3px">📎 Есть подробности</div>`:''}
    </div>
    <div class="task-edit-btn" onclick="openEditModal('${t.id}')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </div>
  </div>`;
}

function bindTaskEvents(){
  document.querySelectorAll('.task[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      S.dragId=el.dataset.id;
      setTimeout(()=>el.classList.add('dragging'),0);
    });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
  document.querySelectorAll('.tl-slot,.tl-empty').forEach(slot=>{
    slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drag-over')});
    slot.addEventListener('dragleave',()=>slot.classList.remove('drag-over'));
    slot.addEventListener('drop',e=>{
      e.preventDefault();slot.classList.remove('drag-over');
      const hour=slot.dataset.hour;
      const date=slot.dataset.date||todayStr();
      if(!S.dragId||!hour) return;
      const task=S.tasks.find(t=>t.id==S.dragId);
      if(task){task.date=date;task.time=`${p2(hour)}:00`;task.type='timed';save();showToast(`Перенесено на ${hour}:00`);renderTimeline();}
    });
  });
}

// ── RENDER TIMELINE ──
function renderTimeline(){
  const today=todayStr();
  const todayTasks=S.tasks.filter(t=>t.date===today&&t.type==='timed');
  const h=nowH();
  const c=document.getElementById('content');
  let html=`<div class="sec">Таймлайн — сегодня</div><div class="timeline">`;
  for(let hr=6;hr<=23;hr++){
    const tasks=todayTasks.filter(t=>t.time&&parseInt(t.time)===hr);
    if(hr===h){
      html+=`<div class="now-line"><div class="now-dot"></div><span>Сейчас ${hr}:${p2(new Date().getMinutes())}</span><div class="now-bar"></div></div>`;
    }
    html+=`<div class="tl-hour">
      <div class="tl-label">${hr}</div>
      <div class="tl-slot" data-hour="${hr}" data-date="${today}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropOnSlot(event,${hr},'${today}')">
        ${tasks.length?tasks.map(t=>taskHTML(t)).join(''):`<div class="tl-empty" data-hour="${hr}" data-date="${today}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropOnSlot(event,${hr},'${today}')"></div>`}
      </div>
    </div>`;
  }
  html+=`</div>`;
  c.innerHTML=html;
  bindTaskEvents();
  // scroll to now
  setTimeout(()=>{
    const idx=h-6;
    const rows=document.querySelectorAll('.tl-hour');
    rows[idx]?.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function dropOnSlot(e,hour,date){
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  if(!S.dragId) return;
  const task=S.tasks.find(t=>t.id==S.dragId);
  if(task){task.date=date;task.time=`${p2(hour)}:00`;task.type='timed';save();showToast(`Перенесено на ${hour}:00`);renderTimeline();}
}

// ── RENDER CALENDAR ──
function renderCalendar(){
  const c=document.getElementById('content');
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const dows=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const y=S.calYear,m=S.calMonth;
  const first=new Date(y,m,1);
  let dow=first.getDay(); if(dow===0) dow=7;
  const dim=new Date(y,m+1,0).getDate();
  const today=todayStr();

  let html=`<div class="cal-wrap">
    <div class="cal-nav">
      <div class="cal-arrow" onclick="calNav(-1)">‹</div>
      <div class="cal-month">${months[m]} ${y}</div>
      <div class="cal-arrow" onclick="calNav(1)">›</div>
    </div>
    <div class="cal-grid">
      ${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}`;

  for(let i=1;i<dow;i++){
    const pd=new Date(y,m,1-dow+i);
    html+=`<div class="cal-day other">${pd.getDate()}</div>`;
  }
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${p2(m+1)}-${p2(d)}`;
    const isToday=ds===today;
    const isSel=ds===S.calSelected;
    const hasTasks=S.tasks.some(t=>t.date===ds);
    html+=`<div class="cal-day ${isToday?'today':''} ${isSel&&!isToday?'selected':''}" onclick="calSelect('${ds}')">
      ${d}${hasTasks?'<div class="cal-dot"></div>':''}
    </div>`;
  }
  html+=`</div>`;

  const selTasks=S.tasks.filter(t=>t.date===S.calSelected).sort((a,b)=>a.time?.localeCompare(b.time));
  html+=`<div class="cal-day-header">${fmtDay(S.calSelected)}</div>`;
  html+=`<div class="cal-day-list">`;
  if(selTasks.length) selTasks.forEach(t=>{html+=taskHTML(t);});
  else html+=`<div class="cal-empty">Нет задач на этот день</div>`;
  html+=`</div></div>`;

  c.innerHTML=html;
  bindTaskEvents();
}

function fmtDay(ds){
  const d=new Date(ds+'T00:00:00');
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function calNav(dir){
  S.calMonth+=dir;
  if(S.calMonth<0){S.calMonth=11;S.calYear--;}
  if(S.calMonth>11){S.calMonth=0;S.calYear++;}
  renderCalendar();
}

function calSelect(ds){S.calSelected=ds;renderCalendar();}

// ── RENDER CHECKLISTS ──
function renderChecklists(){
  const c=document.getElementById('content');
  let html=`<div style="padding:0 12px">`;
  S.lists.forEach(cl=>{
    const done=cl.items.filter(i=>i.done).length;
    const pct=cl.items.length?Math.round(done/cl.items.length*100):0;
    html+=`<div class="cl-card">
      <div class="cl-head">
        <div class="cl-name">${cl.name}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="cl-count">${done}/${cl.items.length}</div>
          <div style="display:flex;gap:4px">
            <button onclick="renameCL(${cl.id})" style="padding:3px 7px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);font-size:11px;color:var(--text2);cursor:pointer">✏️</button>
            <button onclick="deleteCL(${cl.id})" style="padding:3px 7px;border-radius:6px;border:1px solid var(--red-bg);background:var(--red-bg);font-size:11px;color:var(--red);cursor:pointer">🗑</button>
          </div>
        </div>
      </div>
      <div class="cl-bar"><div class="cl-fill" style="width:${pct}%"></div></div>
      ${cl.items.map(item=>`
        <div class="cl-item ${item.done?'done':''}" style="justify-content:space-between">
          <div style="display:flex;align-items:center;gap:8px;flex:1" onclick="toggleCL(${cl.id},${item.id})">
            <div class="cl-box"></div>
            <div class="cl-text">${item.text}</div>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0;margin-left:8px">
            <button onclick="editCLItem(${cl.id},${item.id})" style="padding:2px 6px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);font-size:10px;color:var(--text3);cursor:pointer">✏️</button>
            <button onclick="deleteCLItem(${cl.id},${item.id})" style="padding:2px 6px;border-radius:5px;border:1px solid var(--red-bg);background:var(--red-bg);font-size:10px;color:var(--red);cursor:pointer">✕</button>
          </div>
        </div>`).join('')}
      <button class="cl-add" onclick="addCLItem(${cl.id})">+ Добавить пункт</button>
    </div>`;
  });
  html+=`<button class="cl-add" style="width:100%;margin-bottom:16px" onclick="addChecklist()">+ Новый чеклист</button></div>`;
  c.innerHTML=html;
}

function toggleCL(clId,itemId){
  const cl=S.lists.find(c=>c.id===clId);
  const item=cl?.items.find(i=>i.id===itemId);
  if(item){item.done=!item.done;save();renderChecklists();}
}
function addCLItem(clId){
  const text=prompt('Новый пункт:');
  if(!text) return;
  const cl=S.lists.find(c=>c.id===clId);
  cl.items.push({id:Date.now(),text,done:false});
  save();renderChecklists();
}
function editCLItem(clId,itemId){
  const cl=S.lists.find(c=>c.id===clId);
  const item=cl?.items.find(i=>i.id===itemId);
  if(!item) return;
  const text=prompt('Редактировать пункт:',item.text);
  if(text===null) return;
  item.text=text.trim()||item.text;
  save();renderChecklists();
}
function deleteCLItem(clId,itemId){
  const cl=S.lists.find(c=>c.id===clId);
  if(!cl) return;
  cl.items=cl.items.filter(i=>i.id!==itemId);
  save();renderChecklists();
}
function renameCL(clId){
  const cl=S.lists.find(c=>c.id===clId);
  if(!cl) return;
  const name=prompt('Новое название:',cl.name);
  if(name===null) return;
  cl.name=name.trim()||cl.name;
  save();renderChecklists();
}
function deleteCL(clId){
  if(!confirm('Удалить весь чеклист?')) return;
  S.lists=S.lists.filter(c=>c.id!==clId);
  save();renderChecklists();
}
function addChecklist(){
  const name=prompt('Название чеклиста:');
  if(!name) return;
  S.lists.push({id:Date.now(),name,items:[]});
  save();renderChecklists();
}

// ── RENDER AI ──
function renderAI(){
  const today=todayStr();
  const todayT=S.tasks.filter(t=>(t.date===today||t.type==='anytime')&&!t.done);
  const anytime=S.tasks.filter(t=>t.type==='anytime'&&!t.done);

  const c=document.getElementById('content');
  c.innerHTML=`<div class="ai-wrap">

    <div class="ai-card" style="background:var(--accent-bg);border-color:rgba(10,132,255,0.25)">
      <div class="ai-card-head">
        <div class="ai-icon blue">🎙</div>
        <div class="ai-card-title" style="color:var(--accent)">Голосовое добавление</div>
      </div>
      <div class="ai-body">Отправь голосовое сообщение боту прямо в чат — задача появится здесь автоматически</div>
    </div>

    <div class="ai-card" id="ai-priorities-card">
      <div class="ai-card-head">
        <div class="ai-icon purple">✨</div>
        <div class="ai-card-title">Приоритеты на сегодня</div>
        <button onclick="loadAIPriorities(false)" id="ai-prio-btn" style="margin-left:auto;padding:4px 10px;border-radius:6px;border:1px solid var(--purple-bg);background:var(--purple-bg);color:var(--purple);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Анализировать</button>
      </div>
      <div class="ai-body" id="ai-prio-text" style="margin-top:8px;line-height:1.6">${S.aiInsight||(todayT.length?`У тебя ${todayT.length} задач на сегодня. Нажми «Анализировать» для AI-совета.`:'Задач нет. Добавь что-нибудь!')}</div>
      ${S.aiInsight?`<button onclick="resetAIPriorities()" style="margin-top:10px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif">↺ Сбросить</button>`:''}
    </div>

    <div class="ai-card">
      <div class="ai-card-head">
        <div class="ai-icon blue">🗓</div>
        <div class="ai-card-title">Предложить время</div>
      </div>
      <div class="ai-body" style="margin-bottom:8px">Нажми на задачу без времени — подберём свободный слот</div>
      <div class="ai-chips" id="ai-time-chips">
        ${anytime.length?anytime.slice(0,4).map(t=>`<div class="ai-chip" onclick="suggestTime('${t.id}')">📌 ${t.title.slice(0,22)}</div>`).join(''):`<div style="font-size:12px;color:var(--text3)">Все задачи уже запланированы</div>`}
      </div>
    </div>

    <div class="ai-card">
      <div class="ai-card-head">
        <div class="ai-icon green">✂️</div>
        <div class="ai-card-title">Разбить на шаги</div>
      </div>
      <div class="ai-body" style="margin-bottom:8px">Нажми на задачу — AI создаст чеклист подзадач через Groq</div>
      <div class="ai-chips" id="ai-breakdown-chips">
        ${todayT.length?todayT.slice(0,4).map(t=>`<div class="ai-chip" onclick="breakdownTask('${t.id}')">✂️ ${t.title.slice(0,22)}</div>`).join(''):`<div style="font-size:12px;color:var(--text3)">Нет задач</div>`}
      </div>
    </div>

  </div>`;
}

async function loadAIPriorities(reset){
  if(reset){ S.aiInsight=''; localStorage.removeItem('aiInsight'); renderAI(); return; }
  if(!USER_ID){ showToast('Нет подключения к серверу'); return; }
  const btn=document.getElementById('ai-prio-btn');
  const text=document.getElementById('ai-prio-text');
  btn.textContent='⏳ Думаю...';
  btn.disabled=true;
  try {
    const r=await fetch(`/api/ai/insight/${USER_ID}`,{method:'POST'});
    const data=await r.json();
    const insight=data.insight||'Не удалось получить анализ';
    S.aiInsight=insight;
    localStorage.setItem('aiInsight', insight);
    // re-render AI tab to show insight with reset button
    renderAI();
  } catch(e){
    if(text) text.textContent='Ошибка соединения. Попробуй позже.';
    if(btn){ btn.textContent='Анализировать'; btn.disabled=false; }
  }
}

function resetAIPriorities(){
  loadAIPriorities(true);
}

async function suggestTime(id){
  const task=S.tasks.find(t=>t.id==id);
  if(!task) return;
  const today=todayStr();
  const tomorrow=new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr=`${tomorrow.getFullYear()}-${p2(tomorrow.getMonth()+1)}-${p2(tomorrow.getDate())}`;

  const allSlots=['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00','23:00','23:30'];
  const now=new Date();
  const nowMins=now.getHours()*60+now.getMinutes();

  const busyToday=new Set(S.tasks.filter(t=>t.date===today&&t.time&&String(t.id)!==String(id)).map(t=>t.time));
  const busyTmrw=new Set(S.tasks.filter(t=>t.date===tomorrowStr&&t.time).map(t=>t.time));

  const todaySlots=allSlots.filter(s=>{ const [h,m]=s.split(':').map(Number); return (h*60+m)>nowMins&&!busyToday.has(s); });
  const tmrwSlots=allSlots.filter(s=>!busyTmrw.has(s));

  const existing=document.getElementById('slot-picker');
  if(existing) existing.remove();

  const tmrwLabel=`${tomorrow.getDate()} ${['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][tomorrow.getMonth()]}`;

  const picker=document.createElement('div');
  picker.id='slot-picker';
  picker.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center';
  picker.innerHTML=`
    <div style="background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px 40px;animation:slideUp .22s ease;max-height:85vh;overflow-y:auto">
      <div style="width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px"></div>
      <div style="font-size:15px;font-weight:700;margin-bottom:4px">Выбери время</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:16px">«${task.title.slice(0,40)}»</div>

      ${todaySlots.length>0?`
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px">Сегодня</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
        ${todaySlots.map(s=>`<div onclick="pickSlot('${id}','${s}','${today}')" style="padding:10px 0;border-radius:10px;background:var(--bg3);border:1px solid var(--border);text-align:center;font-size:14px;font-weight:500;cursor:pointer;color:var(--text)">${s}</div>`).join('')}
      </div>`:''}

      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px">Завтра, ${tmrwLabel}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
        ${tmrwSlots.map(s=>`<div onclick="pickSlot('${id}','${s}','${tomorrowStr}')" style="padding:10px 0;border-radius:10px;background:var(--bg3);border:1px solid var(--border);text-align:center;font-size:14px;font-weight:500;cursor:pointer;color:var(--text)">${s}</div>`).join('')}
      </div>

      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px">Своё время</div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <input type="date" id="custom-slot-date" value="${today}" style="flex:1;padding:10px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none">
        <input type="time" id="custom-slot-time" value="" style="flex:1;padding:10px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none">
        <button onclick="pickCustomSlot('${id}')" style="padding:10px 14px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">OK</button>
      </div>

      <button onclick="document.getElementById('slot-picker').remove()" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:none;color:var(--text3);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif">Отмена</button>
    </div>`;
  picker.addEventListener('click', e=>{ if(e.target===picker) picker.remove(); });
  document.body.appendChild(picker);
}

async function pickCustomSlot(id){
  const date=document.getElementById('custom-slot-date')?.value;
  const time=document.getElementById('custom-slot-time')?.value;
  if(!time){ showToast('Укажи время'); return; }
  await pickSlot(id, time, date||todayStr());
}

async function pickSlot(id, slot, date){
  document.getElementById('slot-picker')?.remove();
  const task=S.tasks.find(t=>String(t.id)===String(id));
  if(!task) return;
  task.type='timed';
  task.date=date||todayStr();
  task.time=slot;
  save();
  if(USER_ID && !String(id).startsWith('demo')){
    await fetch(`/api/tasks/${id}`,{
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type:'timed',task_date:task.date,task_time:slot})
    }).catch(()=>{});
  }
  showToast(`✅ Поставлено на ${slot}`);
  renderAI();
}

// ── TASK DETAIL VIEW ──

  if(!t) return;
  const existing=document.getElementById('task-detail');
  if(existing) existing.remove();

  const sheet=document.createElement('div');
  sheet.id='task-detail';
  sheet.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center';
  sheet.innerHTML=`
    <div style="background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px 40px;animation:slideUp .22s ease">
      <div style="width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px"></div>
      <div style="font-size:18px;font-weight:700;margin-bottom:12px;color:var(--text)">${t.title}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">

        ${t.date?`<span style="padding:4px 10px;border-radius:6px;background:var(--bg3);color:var(--text2);font-size:12px">📅 ${t.date}</span>`:''}
        <span style="padding:4px 10px;border-radius:6px;background:var(--bg3);color:var(--text2);font-size:12px">${prio}</span>
        ${t.aiGenerated?`<span style="padding:4px 10px;border-radius:6px;background:var(--purple-bg);color:var(--purple);font-size:12px;font-weight:600">✨ AI</span>`:''}
      </div>
      ${t.details?`
        <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px">Подробности</div>
        <div style="background:var(--bg3);border-radius:12px;padding:12px;font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:14px">${t.details}</div>
      `:''}
      ${t.note?`
        <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px">Заметка</div>
        <div style="background:var(--bg3);border-radius:12px;padding:12px;font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:14px">${t.note}</div>

      <div style="display:flex;gap:8px">
        <button onclick="openEditModal('${t.id}');document.getElementById('task-detail').remove()" style="flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">✏️ Редактировать</button>
        <button onclick="document.getElementById('task-detail').remove()" style="flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:none;color:var(--text3);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif">Закрыть</button>
      </div>
    </div>`;
  sheet.addEventListener('click', e=>{ if(e.target===sheet) sheet.remove(); });
  document.body.appendChild(sheet);
}

async function breakdownTask(id){
  const task=S.tasks.find(t=>t.id==id);
  if(!task) return;
  if(!USER_ID){ showToast('Нет подключения к серверу'); return; }
  showToast('⏳ AI разбивает задачу...');
  try {
    const r=await fetch('/api/ai/breakdown',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({title:task.title,user_id:USER_ID})});
    const data=await r.json();
    const steps=data.steps||[];
    if(!steps.length){ showToast('Не удалось разбить задачу'); return; }
    S.lists.push({id:Date.now(),name:task.title,
      items:steps.map((s,i)=>({id:Date.now()+i,text:s,done:false}))});
    save();
    showToast('✅ Чеклист создан!');
    switchTab('checklist',null,'checklist');
  } catch(e){
    showToast('Ошибка. Попробуй снова.');
  }
}

// ── TASK ACTIONS ──
function toggleTask(id){
  const t=S.tasks.find(t=>t.id==id);
  if(t){t.done=!t.done;save();S.tab==='today'?renderToday():S.tab==='timeline'?renderTimeline():renderCalendar();}
}

// ── MODAL ──
function openModal(){
  document.getElementById('f-date').value=todayStr();
  document.getElementById('f-time').value=nowTimeStr();
  document.getElementById('f-title').value='';
  document.getElementById('f-note').value='';
  S.newType='timed';S.newPrio='high';
  document.getElementById('f-time-wrap').style.display='grid';
  document.querySelectorAll('.seg-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.prio-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),300);
}
function closeOutside(e){if(e.target.id==='modal') document.getElementById('modal').classList.remove('open');}
function setTaskType(type,btn){
  S.newType=type;
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('f-time-wrap').style.display=type==='timed'?'grid':'none';
}
function setPrio(p,btn){
  S.newPrio=p;
  document.querySelectorAll('.prio-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){showToast('Введи название');return;}
  const task={
    id:String(Date.now()),
    title,
    type:S.newType,
    date:S.newType==='timed'?document.getElementById('f-date').value:null,
    time:S.newType==='timed'?document.getElementById('f-time').value||null:null,
    note:document.getElementById('f-note').value.trim(),
    prio:S.newPrio,
    done:false,
    aiGenerated:false,
  };
  S.tasks.push(task);
  save();
  if(USER_ID) saveTaskToServer(task);
  document.getElementById('modal').classList.remove('open');
  showToast('✅ Задача добавлена');
  switchTab(S.tab);
}

// ── EDIT MODAL ──
let editingId = null;

function openEditModal(id){
  const t = S.tasks.find(x=>x.id==id);
  if(!t) return;
  editingId = id;
  document.getElementById('e-title').value = t.title;
  document.getElementById('e-note').value = t.note||'';
  document.getElementById('e-details').value = t.details||'';
  document.getElementById('e-date').value = t.date||todayStr();
  document.getElementById('e-time').value = t.time||'';
  document.querySelectorAll('.eseg-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.eseg-btn').forEach(b=>{
    if((t.type==='timed'&&b.dataset.type==='timed')||(t.type==='anytime'&&b.dataset.type==='anytime')) b.classList.add('active');
  });
  document.getElementById('e-time-wrap').style.display = t.type==='timed'?'grid':'none';
  document.querySelectorAll('.eprio-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.prio===t.prio);
  });
  document.getElementById('edit-modal').classList.add('open');
}

function setEditType(type, btn){
  document.querySelectorAll('.eseg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('e-time-wrap').style.display = type==='timed'?'grid':'none';
}

function setEditPrio(p, btn){
  document.querySelectorAll('.eprio-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

async function updateTask(){
  const t = S.tasks.find(x=>x.id==editingId);
  if(!t) return;
  const activeType = document.querySelector('.eseg-btn.active')?.dataset.type || t.type;
  const activePrio = document.querySelector('.eprio-btn.active')?.dataset.prio || t.prio;
  t.title = document.getElementById('e-title').value.trim() || t.title;
  t.note  = document.getElementById('e-note').value.trim();
  t.details = document.getElementById('e-details').value.trim();
  t.type  = activeType;
  t.date  = activeType==='timed' ? document.getElementById('e-date').value : null;
  t.time  = activeType==='timed' ? document.getElementById('e-time').value||null : null;
  t.prio  = activePrio;
  save();
  if(USER_ID && !String(editingId).startsWith('demo')){
    await fetch(`/api/tasks/${editingId}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({title:t.title,note:t.note,type:t.type,task_date:t.date,task_time:t.time,prio:t.prio})
    }).catch(()=>{});
  }
  document.getElementById('edit-modal').classList.remove('open');
  showToast('✅ Сохранено');
  switchTab(S.tab);
}

async function deleteTask(){
  if(!confirm('Удалить задачу?')) return;
  const idx = S.tasks.findIndex(x=>x.id==editingId);
  if(idx!==-1) S.tasks.splice(idx,1);
  save();
  if(USER_ID && !String(editingId).startsWith('demo')){
    await fetch(`/api/tasks/${editingId}`, {method:'DELETE'}).catch(()=>{});
  }
  document.getElementById('edit-modal').classList.remove('open');
  showToast('🗑 Удалено');
  switchTab(S.tab);
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── API SYNC ──
const API = '';
let USER_ID = 0;

function getUserId(){
  try {
    const tg = window.Telegram?.WebApp;
    if(tg?.initDataUnsafe?.user?.id) return tg.initDataUnsafe.user.id;
    if(tg?.initData){
      const params = new URLSearchParams(tg.initData);
      const user = JSON.parse(decodeURIComponent(params.get('user')||'{}'));
      if(user.id) return user.id;
    }
  } catch(e){}
  return 0;
}

async function syncFromServer(){
  if(!USER_ID) return;
  try {
    const r = await fetch(`/api/tasks/${USER_ID}`);
    if(!r.ok) return;
    const data = await r.json();
    if(data.tasks.length > 0){
      S.tasks = S.tasks.filter(t=>!String(t.id).startsWith('demo'));
    }
    data.tasks.forEach(t=>{
      const existing = S.tasks.find(x=>String(x.id)===String(t.id));
      if(!existing){
        S.tasks.push({
          id: String(t.id), title: t.title, note: t.note||'',
          details: t.details||'',
          type: t.type, date: t.task_date, time: t.task_time,
          prio: t.prio||'med', done: Boolean(t.done), aiGenerated: Boolean(t.ai_generated),
        });
      } else {
        existing.done = Boolean(t.done);
        existing.title = t.title;
      }
    });
    if(data.checklists?.length){
      data.checklists.forEach(cl=>{
        if(!S.lists.find(x=>x.id===cl.id)) S.lists.push(cl);
      });
    }
    save();
    switchTab(S.tab);
  } catch(e){ console.log('sync error',e); }
}

async function saveTaskToServer(task){
  if(!USER_ID) return;
  try {
    await fetch(`${API}/api/tasks/${USER_ID}`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        title: task.title, note: task.note,
        type: task.type, task_date: task.date,
        task_time: task.time, prio: task.prio,
      })
    });
  } catch(e){}
}

async function updateTaskOnServer(id, fields){
  if(!USER_ID) return;
  try {
    await fetch(`${API}/api/tasks/${id}`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(fields)
    });
  } catch(e){}
}

// ── INIT ──
function init(){
  USER_ID = getUserId();
  if(!USER_ID) loadDemo();
  initHeader();
  renderToday();
  if(USER_ID){
    syncFromServer();
    setInterval(syncFromServer, 10000);
  }
}

// Ждём пока Telegram WebApp полностью загрузится
if(window.Telegram?.WebApp){
  window.Telegram.WebApp.ready();
  setTimeout(init, 300);
} else {
  window.addEventListener('load', ()=>setTimeout(init, 300));
}
